<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer precision ring -->
  <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.5"/>
  <!-- Cross-hair lines -->
  <line x1="16" y1="3" x2="16" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="29" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="8" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="29" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5.5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Center drill point -->
  <circle cx="16" cy="16" r="2" fill="currentColor"/>
</svg>
