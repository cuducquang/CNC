services:
  python-service:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cncapp-python
    ports:
      - "8001:8001"
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      FREECAD_PATH: /usr/lib/freecad/lib
      PYTHONPATH: /app/python
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  cncapp:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # NEXT_PUBLIC_* must be baked in at build time.
        # docker compose reads these from .env.local automatically
        # when you run: docker compose --env-file .env.local up --build
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      python-service:
        condition: service_healthy
    # Ensures host.docker.internal resolves to the Windows/Mac host
    # (automatic on Docker Desktop, explicit here for Linux Docker Engine compatibility)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.local        # server-side vars injected at runtime (API keys, model URLs, etc.)
    environment:
      # Internal service wiring — hardcoded, not in .env.local
      # (inside Docker, python-service resolves via Docker DNS, not localhost)
      PYTHON_SERVICE_URL: http://python-service:8001
      # LOCAL_OLLAMA_URL, VISION_MODEL, VISION_TIMEOUT_MS come from .env.local
      # (pointing to RunPod vLLM: https://rlnp01b095y6lf-11434.proxy.runpod.net)
      # Vision-call runtime controls
      PDF_MAX_PAGES_FOR_VISION: "4"
      VISION_PAGE_CONCURRENCY: "1"
