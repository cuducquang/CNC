services:

  # ── Unified Python service: both Approach 1 (LLM) + Approach 2 (FreeCAD) ───
  # server.py handles all endpoints on port 8001.
  python-service:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cncapp-python
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      FREECAD_PATH: /usr/lib/freecad/lib
      PYTHONPATH: /app/python
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s    # FreeCAD init is slow

  # ── Next.js frontend (port 3000) ────────────────────────────────────────────
  cncapp:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # NEXT_PUBLIC_* are baked into the JS bundle at build time.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        # Both approaches served from the same Python service on port 8001.
        NEXT_PUBLIC_PYTHON_SERVICE_URL: ${NEXT_PUBLIC_PYTHON_SERVICE_URL:-http://localhost:8001}
        NEXT_PUBLIC_PYTHON_V1_URL: ${NEXT_PUBLIC_PYTHON_V1_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    depends_on:
      python-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.local
    environment:
      # Server-side (SSR / API routes) — use Docker internal DNS, not localhost
      PYTHON_SERVICE_URL: http://python-service:8001
      PYTHON_LLM_URL: http://python-service:8001
      # Pipeline caps
      PDF_MAX_PAGES_FOR_VISION: "4"
      VISION_PAGE_CONCURRENCY: "1"
